<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omar's Styles 01</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="panel">

      <div class="sec">
        <div class="sec-lbl">mode</div>
        <div class="row">
          <button class="btn on" data-mode="noise">noise</button>
          <button class="btn" data-mode="static">static</button>
          <button class="btn" data-mode="image">image</button>
          <button class="btn" data-mode="hybrid">hybrid</button>
        </div>
        <div id="blend-row" style="display:none;margin-top:2px;">
          <div class="sl-r"><span class="sl-l">blend</span><input type="range" min="0" max="100" value="50" id="s-blend" step="1"><span class="sl-v" id="v-blend">50%</span></div>
        </div>
      </div>

      <div class="sec">
        <div class="sec-lbl">grid</div>
        <div class="sl-r"><span class="sl-l">width</span><input type="number" min="100" max="3840" value="1200" id="s-cw" step="10" class="hx"></div>
        <div class="ar-row"><button id="btn-ar" class="btn">link</button></div>
        <div class="sl-r"><span class="sl-l">height</span><input type="number" min="100" max="3840" value="750" id="s-ch" step="10" class="hx"></div>
        <div class="sl-r"><span class="sl-l">density</span><input type="range" min="12" max="100" value="50" id="s-cols" step="1"><span class="sl-v" id="v-cols">50</span></div>
        <div class="sl-r"><span class="sl-l">speed</span><input type="range" min="1" max="100" value="50" id="s-spd" step="1"><span class="sl-v" id="v-spd">50</span></div>
      </div>

      <div class="sec">
        <div class="sec-lbl">shape</div>
        <div class="row">
          <button class="sh" data-shape="circle" title="circle">●</button>
          <button class="sh" data-shape="square" title="square">■</button>
          <button class="sh on" data-shape="diamond" title="diamond">◆</button>
          <button class="sh" data-shape="triangle" title="triangle">▲</button>
          <button class="sh" data-shape="bar" title="bar">▐</button>
          <button class="sh" data-shape="ring" title="ring">○</button>
          <button class="sh" data-shape="custom" id="cs-btn" style="display:none;font-size:10px;padding:3px 5px;">SVG</button>
        </div>
        <div class="sl-r" style="margin-top:6px;"><span class="sl-l">rotate</span><input type="range" min="0" max="360" value="0" id="s-rot" step="1"><span class="sl-v" id="v-rot">0°</span></div>
        <div id="cs-zone">+ upload SVG shape</div>
        <input type="file" id="cs-file" accept=".svg,image/svg+xml" style="display:none">
      </div>

      <div class="sec">
        <div class="sec-lbl">color</div>
        <div class="cl-r">
          <span class="cl-lbl">dot</span>
          <input type="color" class="cpick" id="fg-col" value="#0F0F0F">
          <input class="hx" type="text" id="fg-hex" value="#0F0F0F" maxlength="7" placeholder="#000000">
        </div>
        <div class="cl-r">
          <span class="cl-lbl">bg</span>
          <input type="color" class="cpick" id="bg-col" value="#ECEAE4">
          <input class="hx" type="text" id="bg-hex" value="#ECEAE4" maxlength="7" placeholder="#ffffff">
        </div>
      </div>

      <div class="sec">
        <div class="sec-lbl">media</div>
        <div id="media-drop">
          <div class="md-icon">↑</div>
          <div class="md-title">drop image or video</div>
          <div class="md-sub"><u id="media-browse">browse file</u> · paste · drag &amp; drop</div>
          <div class="md-note">canvas size will match file</div>
          <img id="img-thumb" alt="">
        </div>
        <input type="file" id="media-file" accept="image/*,video/*" style="display:none">
        <div class="media-status" id="media-status">
          <span id="media-name" style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
          <span class="media-clear" id="media-clear">× clear</span>
        </div>
        <div id="vid-ctrl" style="display:none;margin-bottom:5px;">
          <button class="btn" id="btn-pp">⏸ pause</button>
        </div>
        <div id="img-ctrls" style="display:none">
          <div class="sl-r"><span class="sl-l">contrast</span><input type="range" min="50" max="300" value="130" id="s-con" step="5"><span class="sl-v" id="v-con">1.3</span></div>
          <div class="sl-r"><span class="sl-l">bright</span><input type="range" min="-50" max="50" value="0" id="s-bri" step="2"><span class="sl-v" id="v-bri">0</span></div>
          <div class="sl-r"><span class="sl-l">thresh</span><input type="range" min="0" max="90" value="0" id="s-thr" step="2"><span class="sl-v" id="v-thr">off</span></div>
          <div class="sl-r"><span class="sl-l">scale</span><input type="range" min="20" max="200" value="100" id="s-scl" step="5"><span class="sl-v" id="v-scl">1.0×</span></div>
          <div class="row"><button class="btn" id="btn-inv">invert</button><button class="btn" id="btn-reveal" style="display:none">reveal ↓</button></div>
        </div>
      </div>

      <div class="sec">
        <div class="sec-lbl">export</div>
        <div class="row">
          <button class="btn" id="btn-copy">⎋ illustrator</button>
          <button class="btn" id="btn-svg">↓ SVG</button>
        </div>
        <div class="row" style="margin-top:2px;"><button class="btn" id="btn-shuffle">shuffle</button><button class="btn" id="btn-save">↓ save settings</button></div>
        <div class="row" style="margin-top:2px;align-items:center;">
          <button class="btn" id="btn-rec">● rec</button>
          <span id="rec-timer" style="font-size:11px;color:var(--color-text-tertiary);display:none"></span>
        </div>
        <div id="exp-fb"></div>
      </div>

    </div>
    <div id="stage">
      <canvas id="cv"></canvas>
      <p id="hint">hover to grow · click for ripple · drop image or video</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
